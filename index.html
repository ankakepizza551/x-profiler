<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Creator Profile Card Maker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --pop-blue: #a1ffce;
            --pop-yellow: #faffd1;
            --accent-art: #ff4757; /* イラスト用赤 */
            --accent-dtm: #2f3542; /* DTM用ダークグレー */
            --accent-game: #1e90ff; /* ゲーム用青 */
            --form-bg: #f8f9fa;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2d3436;
        }

        /* エディタエリアのブラッシュアップ */
        .editor-container {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
            z-index: 10; /* カードより前に表示 */
        }

        .section-label {
            font-size: 13px;
            font-weight: bold;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -5px;
        }

        .input-row { 
            display: flex; 
            flex-direction: row; 
            gap: 10px; 
        }

        @media (max-width: 600px) {
            .input-row { flex-direction: column; gap: 12px; }
        }

        input, textarea {
            padding: 14px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            background: var(--form-bg);
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #74b9ff;
            background: #fff;
            box-shadow: 0 0 15px rgba(116, 185, 255, 0.2);
        }

        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-get { background: #00acee; color: white; width: 80px; flex-shrink: 0; }
        .btn-get:hover { background: #0087bd; }

        .btn-save { 
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%); 
            color: white; 
            padding: 18px;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 100%;
            margin-top: 10px;
        }
        .btn-save:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .btn-save:active { transform: scale(0.96); }

        /* プレビュー表示エリア（スマホ対応スクロール） */
        .preview-outer {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: #dcdde1;
            padding: 40px 0;
            display: flex;
            justify-content: flex-start;
            border-radius: 24px;
        }

        /* カード実体 (1600x900) */
        #card-capture {
            width: 1600px;
            height: 900px;
            background: linear-gradient(135deg, var(--pop-blue) 0%, var(--pop-yellow) 100%);
            border-radius: 60px;
            display: flex;
            padding: 90px;
            box-sizing: border-box;
            position: relative;
            flex-shrink: 0;
            transform-origin: top left;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .left-panel {
            flex: 1;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 中央寄せで安定感を出す */
            padding-right: 60px;
        }

        .profile-header {
            display: flex;
            flex-direction: column; 
            align-items: flex-start;
            margin-bottom: 50px;
        }

        #out-icon {
            width: 200px;
            height: 200px;
            background: #fff;
            border: 12px solid #fff; /* 白枠で高級感 */
            border-radius: 50%;
            margin-bottom: 30px; 
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .name-container {
            width: 100%;
            word-wrap: break-word; 
        }

        .name-text {
            font-size: 90px;
            font-weight: 900;
            margin: 0;
            color: #2d3436;
            line-height: 1.0;
            letter-spacing: -3px;
        }

        .id-text {
            font-size: 45px; 
            color: #636e72;
            margin: 15px 0 0 0;
            font-weight: 500;
        }

        .about-text {
            font-size: 40px;
            line-height: 1.6;
            color: #2d3436;
            margin-top: 40px;
            white-space: pre-wrap;
            font-weight: 500;
        }

        /* 右側パネル（3項目構成） */
        .right-panel { width: 680px; display: flex; flex-direction: column; gap: 45px; z-index: 1; justify-content: center; }
        .item {
            background: rgba(255, 255, 255, 0.85); /* 半透明で背景を透かす */
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .item-icon {
            width: 90px;
            height: 90px;
            border-radius: 25px;
            margin-right: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .item-title { font-size: 42px; font-weight: 800; margin: 0; color: #2d3436; }
        .item-desc { font-size: 26px; color: #636e72; margin: 8px 0 0 0; font-weight: bold; }
        
        .deco { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.5); z-index: 0; }
    </style>
</head>
<body>

    <div class="editor-container">
        <div class="section-label">1. Icon Fetch</div>
        <div class="input-row">
            <input type="text" id="in-x-id" placeholder="XのID（@なし）">
            <button class="btn-action btn-get" onclick="loadXIcon()">取得</button>
        </div>
        
        <div class="section-label">2. Basic Info</div>
        <div class="input-row">
            <input type="text" id="in-name" placeholder="名前" value="クリエイター名">
            <input type="text" id="in-id" placeholder="ID" value="@handle_id">
        </div>
        <textarea id="in-about" rows="3">イラスト、DTM、ゲーム。
マルチに活動するクリエイターです。
お気軽にフォローしてください！</textarea>

        <div class="section-label">3. Activities</div>
        <div class="input-row">
            <input type="text" id="in-t1" placeholder="項目1（イラスト）" value="ILLUST / ART">
            <input type="text" id="in-d1" placeholder="詳細1" value="厚塗り・アニメ塗りメイン">
        </div>
        <div class="input-row">
            <input type="text" id="in-t2" placeholder="項目2（音楽）" value="DTM / MUSIC">
            <input type="text" id="in-d2" placeholder="詳細2" value="Stock Music / 楽曲制作">
        </div>
        <div class="input-row">
            <input type="text" id="in-t3" placeholder="項目3（ゲーム）" value="GAME / PLAY">
            <input type="text" id="in-d3" placeholder="詳細3" value="格ゲー / 非想天則 / FPS">
        </div>
        
        <button class="btn-action btn-save" onclick="saveImage()">画像を保存する</button>
    </div>

    <div class="preview-outer" id="preview-outer">
        <div id="card-capture">
            <div class="deco" style="width:300px; height:300px; top:-100px; left:-100px;"></div>
            <div class="deco" style="width:200px; height:200px; bottom:50px; right:150px;"></div>
            
            <div class="left-panel">
                <div class="profile-header">
                    <img id="out-icon" src="data:image/svg+xml;charset=UTF-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23ccc'><circle cx='50' cy='50' r='50'/></svg>">
                    <div class="name-container">
                        <p class="name-text" id="out-name"></p>
                        <p class="id-text" id="out-id"></p>
                    </div>
                </div>
                <div class="about-text" id="out-about"></div>
            </div>

            <div class="right-panel">
                <div class="item">
                    <div class="item-icon" style="background: var(--accent-art);">🎨</div>
                    <div><p class="item-title" id="out-t1"></p><p class="item-desc" id="out-d1"></p></div>
                </div>
                <div class="item">
                    <div class="item-icon" style="background: var(--accent-dtm);">⌨️</div>
                    <div><p class="item-title" id="out-t2"></p><p class="item-desc" id="out-d2"></p></div>
                </div>
                <div class="item">
                    <div class="item-icon" style="background: var(--accent-game);">🎮</div>
                    <div><p class="item-title" id="out-t3"></p><p class="item-desc" id="out-d3"></p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // プレビューの縮小表示（スマホ対応）
        function setScale() {
            const outer = document.getElementById('preview-outer');
            const card = document.getElementById('card-capture');
            const scale = outer.offsetWidth / 1600;
            const finalScale = Math.min(scale, 1);
            card.style.transform = `scale(${finalScale})`;
            // 縮小によって生じる下の余白を調整
            const scaledHeight = 900 * finalScale;
            outer.style.height = (scaledHeight + 80) + "px";
        }
        window.addEventListener('resize', setScale);
        window.addEventListener('load', setScale);

        // Xアイコン取得
        function loadXIcon() {
            const id = document.getElementById('in-x-id').value;
            if(!id) return alert('XのIDを入力してください');
            const img = document.getElementById('out-icon');
            img.crossOrigin = "anonymous"; // 画像保存に必要
            img.src = `https://unavatar.io/twitter/${id}`;
            img.onerror = () => alert('アイコンの取得に失敗しました。IDを確認してください。');
        }

        // リアルタイム反映
        const fields = ['name', 'id', 'about', 't1', 'd1', 't2', 'd2', 't3', 'd3'];
        function update() {
            fields.forEach(f => { document.getElementById('out-'+f).innerText = document.getElementById('in-'+f).value; });
        }
        fields.forEach(f => { document.getElementById('in-'+f).addEventListener('input', update); });
        // 初期実行
        update();

        // 画像保存
        function saveImage() {
            const card = document.getElementById('card-capture');
            const currentTransform = card.style.transform;
            card.style.transform = "scale(1)"; // 保存時は等倍に戻す

            html2canvas(card, { 
                useCORS: true, 
                scale: 1,
                backgroundColor: null // 背景を透明に
            }).then(canvas => {
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = "creator-profile-card.png";
                
                // スマホ（特にiOS）では別タブで開く
                if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){
                    const newWin = window.open("");
                    newWin.document.write('<div style="text-align:center;font-family:sans-serif;padding:20px;"><h3>画像を長押しして保存</h3><img src="'+link.href+'" style="width:100%; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1);"></div>');
                } else {
                    link.click();
                }
                card.style.transform = currentTransform; // プレビューの縮小を戻す
            });
        }
    </script>
</body>
</html>
