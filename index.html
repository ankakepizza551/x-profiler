<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Creator Card Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a1ffce 0%, #faffd1 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --accent-blue: #0984e3;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        .editor {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-row { display: flex; gap: 8px; }
        input, textarea {
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            font-size: 15px;
        }

        .btn-get { background: #00acee; color: white; border: none; border-radius: 10px; padding: 0 20px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--text-main); color: white; padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; }

        #preview-wrap {
            width: 100%;
            overflow-x: auto;
            background: #dcdde1;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            border-radius: 20px;
        }

        #card {
            width: 1600px;
            height: 900px;
            background: var(--bg-gradient);
            display: flex;
            padding: 70px 80px;
            box-sizing: border-box;
            position: relative;
            flex-shrink: 0;
            transform-origin: top left;
        }

        .left-side {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #out-icon {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 10px solid white;
            margin-bottom: 25px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .out-name { font-size: 75px; font-weight: 900; margin: 0; line-height: 1.1; }
        .out-id { font-size: 38px; color: var(--text-sub); margin-bottom: 25px; font-weight: bold; }
        .out-bio { font-size: 26px; line-height: 1.5; white-space: pre-wrap; max-width: 800px; }

        .right-side {
            width: 620px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 25px;
        }

        .badge {
            background: var(--card-bg);
            padding: 25px 30px;
            border-radius: 25px;
            border-left: 12px solid #00b894;
            backdrop-filter: blur(5px);
        }

        .badge-title { font-size: 22px; font-weight: bold; color: var(--text-sub); margin-bottom: 4px; }
        .badge-content { font-size: 34px; font-weight: 900; }

        .url-box {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px 30px;
            border-radius: 20px;
        }
        .url-label { font-size: 20px; font-weight: bold; color: var(--text-sub); }
        .url-text { font-size: 24px; color: var(--accent-blue); font-weight: bold; word-break: break-all; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="editor">
        <div class="input-row">
            <input type="text" id="in-x-id" placeholder="X ID (例: ankakepizza551)">
            <button class="btn-get" onclick="loadIcon()">取得</button>
        </div>
        <input type="text" id="in-name" placeholder="名前" value="ねのーん@マルチクリエイター">
        <input type="text" id="in-id" placeholder="表示用ID" value="@ankakepizza551">
        <textarea id="in-bio" rows="6" placeholder="自己紹介文 (15行程度まで)"></textarea>
        
        <div class="input-row">
            <input type="text" id="in-b1-t" placeholder="バッジ見出し" value="MAIN">
            <input type="text" id="in-b1-c" placeholder="バッジ内容" value="DTM / Web制作">
        </div>
        
        <div class="input-row">
            <input type="text" id="in-u1-l" placeholder="URLラベル1" value="YouTube">
            <input type="text" id="in-u1-v" placeholder="URL 1">
        </div>
        <div class="input-row">
            <input type="text" id="in-u2-l" placeholder="URLラベル2" value="ニコニコ動画">
            <input type="text" id="in-u2-v" placeholder="URL 2">
        </div>
        
        <button class="btn-save" onclick="saveImage()">画像を保存する</button>
    </div>

    <div id="preview-wrap">
        <div id="card">
            <div class="left-side">
                <img id="out-icon" src="https://unavatar.io/twitter/google">
                <p class="out-name" id="disp-name"></p>
                <p class="out-id" id="disp-id"></p>
                <div class="out-bio" id="disp-bio"></div>
            </div>
            <div class="right-side">
                <div class="badge">
                    <div class="badge-title" id="disp-b1-t"></div>
                    <div class="badge-content" id="disp-b1-c"></div>
                </div>
                <div class="url-box">
                    <div class="url-label" id="disp-u1-l"></div>
                    <div class="url-text" id="disp-u1-v"></div>
                </div>
                <div class="url-box">
                    <div class="url-label" id="disp-u2-l"></div>
                    <div class="url-text" id="disp-u2-v"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fields = ['name', 'id', 'bio', 'b1-t', 'b1-c', 'u1-l', 'u1-v', 'u2-l', 'u2-v'];
        
        function update() {
            fields.forEach(f => {
                document.getElementById('disp-'+f).innerText = document.getElementById('in-'+f).value;
            });
        }

        function loadIcon() {
            const id = document.getElementById('in-x-id').value;
            if(!id) return;
            const img = document.getElementById('out-icon');
            img.crossOrigin = "anonymous";
            img.src = `https://unavatar.io/twitter/${id}`;
        }

        fields.forEach(f => document.getElementById('in-'+f).addEventListener('input', update));
        
        function setScale() {
            const wrap = document.getElementById('preview-wrap');
            const card = document.getElementById('card');
            const scale = Math.min(wrap.offsetWidth / 1600, 1);
            card.style.transform = `scale(${scale})`;
            wrap.style.height = (900 * scale + 60) + "px";
        }

        window.addEventListener('resize', setScale);
        window.addEventListener('load', () => { update(); setScale(); });

        function saveImage() {
            const card = document.getElementById('card');
            const currentTransform = card.style.transform;
            card.style.transform = "scale(1)";
            html2canvas(card, { useCORS: true, scale: 1 }).then(canvas => {
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = "my-profile-card.png";
                if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){
                    const newWin = window.open("");
                    newWin.document.write('<div style="text-align:center;padding:20px;"><img src="'+link.href+'" style="width:100%; border-radius:20px;"><p>長押しして保存してください</p></div>');
                } else { link.click(); }
                card.style.transform = currentTransform;
            });
        }
    </script>
</body>
</html>
