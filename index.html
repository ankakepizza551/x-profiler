<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Card Maker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --pop-blue: #a1ffce;
            --pop-yellow: #faffd1;
            --accent-orange: #ff9f43;
            --accent-purple: #5f27cd;
            --accent-green: #10ac84;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* エディタエリア */
        .editor-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-row { display: flex; gap: 8px; }
        .input-row input { flex: 1; }

        input, textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-get { background: #1DA1F2; color: white; }
        .btn-save { background: #333; color: white; margin-top: 10px; }

        /* プレビューエリア（スマホ対応スクロール） */
        .preview-outer {
            width: 100%;
            overflow-x: auto;
            background: #e0e0e0;
            padding: 20px 0;
            display: flex;
            justify-content: flex-start;
        }

        /* カード実体 (1600x900) */
        #card-capture {
            width: 1600px;
            height: 900px;
            background: linear-gradient(135deg, var(--pop-blue) 0%, var(--pop-yellow) 100%);
            border-radius: 40px;
            display: flex;
            padding: 80px;
            box-sizing: border-box;
            position: relative;
            flex-shrink: 0;
            transform-origin: top left;
        }

        /* --- ここから内部レイアウトの修正 --- */
        .left-panel {
            flex: 1;
            z-index: 1;
            display: flex;
            flex-direction: column;
            padding-right: 40px;
            overflow: hidden; /* はみ出し防止 */
        }

        .profile-header {
            display: flex;
            flex-direction: column; /* 横並びから縦並びに変更 */
            align-items: flex-start;
            margin-bottom: 40px;
        }

        #out-icon {
            width: 180px;
            height: 180px;
            background: #fff;
            border: 10px solid #ffeb3b;
            border-radius: 50%;
            margin-bottom: 25px; /* 下にマージンを持たせる */
            object-fit: cover;
        }

        .name-container {
            width: 100%;
            word-wrap: break-word; /* 長い名前を自動改行 */
        }

        .name-text {
            font-size: 80px;
            font-weight: 900;
            margin: 0;
            color: #333;
            line-height: 1.1;
        }

        .id-text {
            font-size: 45px; /* 少し大きくして読みやすく */
            color: #666;
            margin: 10px 0 0 0;
            font-weight: bold;
        }

        .about-text {
            font-size: 38px;
            line-height: 1.5;
            color: #444;
            margin-top: 30px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* 右側パネル */
        .right-panel { width: 650px; display: flex; flex-direction: column; gap: 40px; z-index: 1; }
        .item {
            background: white; padding: 30px; border-radius: 30px;
            display: flex; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .item-icon {
            width: 80px; height: 80px; border-radius: 20px; margin-right: 25px;
            display: flex; justify-content: center; align-items: center; font-size: 40px; color: white;
        }
        .item-title { font-size: 36px; font-weight: bold; margin: 0; }
        .item-desc { font-size: 24px; color: #777; margin: 5px 0 0 0; }
        .deco { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.4); z-index: 0; }
    </style>
</head>
<body>

    <div class="editor-container">
        <label style="font-size:12px; color:#666;">① アイコン取得</label>
        <div class="input-row">
            <input type="text" id="in-x-id" placeholder="XのID（@なし）">
            <button class="btn-action btn-get" onclick="loadXIcon()">取得</button>
        </div>
        
        <label style="font-size:12px; color:#666; margin-top:10px;">② 内容編集</label>
        <div class="input-row">
            <input type="text" id="in-name" placeholder="名前" value="クリエイター名">
            <input type="text" id="in-id" placeholder="ID" value="@handle_id">
        </div>
        <textarea id="in-about" rows="3">自己紹介をここに記入。
スマホからも編集して保存できます！</textarea>
        <input type="text" id="in-t1" placeholder="項目1" value="DTM / 楽曲制作">
        <input type="text" id="in-d1" placeholder="詳細1" value="Audiostock等で公開中">
        <input type="text" id="in-t2" placeholder="項目2" value="GAME">
        <input type="text" id="in-d2" placeholder="詳細2" value="非想天則 / 格ゲー">
        
        <button class="btn-action btn-save" onclick="saveImage()">画像を保存する</button>
    </div>

    <div class="preview-outer" id="preview-outer">
        <div id="card-capture">
            <div class="deco" style="width:200px; height:200px; top:-50px; left:-50px;"></div>
            <div class="deco" style="width:150px; height:150px; bottom:100px; right:100px;"></div>
            
            <div class="left-panel">
                <div class="profile-header">
                    <img id="out-icon" src="data:image/svg+xml;charset=UTF-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23ccc'><circle cx='50' cy='50' r='50'/></svg>">
                    <div class="name-container">
                        <p class="name-text" id="out-name"></p>
                        <p class="id-text" id="out-id"></p>
                    </div>
                </div>
                <div class="about-text" id="out-about"></div>
            </div>

            <div class="right-panel">
                <div class="item">
                    <div class="item-icon" style="background: var(--accent-orange);">🎵</div>
                    <div><p class="item-title" id="out-t1"></p><p class="item-desc" id="out-d1"></p></div>
                </div>
                <div class="item">
                    <div class="item-icon" style="background: var(--accent-purple);">🎮</div>
                    <div><p class="item-title" id="out-t2"></p><p class="item-desc" id="out-d2"></p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function setScale() {
            const outer = document.getElementById('preview-outer');
            const card = document.getElementById('card-capture');
            const scale = outer.offsetWidth / 1600;
            const finalScale = Math.min(scale, 1);
            card.style.transform = `scale(${finalScale})`;
            outer.style.height = (900 * finalScale) + 40 + "px";
        }
        window.addEventListener('resize', setScale);
        window.addEventListener('load', setScale);

        function loadXIcon() {
            const id = document.getElementById('in-x-id').value;
            if(!id) return;
            const img = document.getElementById('out-icon');
            img.crossOrigin = "anonymous";
            img.src = `https://unavatar.io/twitter/${id}`;
        }

        const fields = ['name', 'id', 'about', 't1', 'd1', 't2', 'd2'];
        function update() {
            fields.forEach(f => { document.getElementById('out-'+f).innerText = document.getElementById('in-'+f).value; });
        }
        fields.forEach(f => { document.getElementById('in-'+f).addEventListener('input', update); });
        update();

        function saveImage() {
            const card = document.getElementById('card-capture');
            const currentTransform = card.style.transform;
            card.style.transform = "scale(1)";

            html2canvas(card, { useCORS: true, scale: 1 }).then(canvas => {
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = "profile-card.png";
                
                if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){
                    const newWin = window.open("");
                    newWin.document.write('<h3>画像を長押しして保存</h3><img src="'+link.href+'" style="width:100%;">');
                } else {
                    link.click();
                }
                card.style.transform = currentTransform;
            });
        }
    </script>
</body>
</html>
