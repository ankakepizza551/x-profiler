<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Creator Card Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a1ffce 0%, #faffd1 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #2d3436;
            --text-sub: #636e72;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* エディタ部分 */
        .editor {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-save {
            background: #2d3436;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* プレビューエリア */
        #preview-wrap {
            width: 100%;
            overflow-x: auto;
            background: #ccc;
            padding: 20px;
            border-radius: 15px;
        }

        /* カード本体 (1600x900) */
        #card {
            width: 1600px;
            height: 900px;
            background: var(--bg-gradient);
            display: flex;
            padding: 80px;
            box-sizing: border-box;
            position: relative;
            flex-shrink: 0;
            transform-origin: top left;
        }

        .left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #out-icon {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 10px solid white;
            margin-bottom: 30px;
            object-fit: cover;
        }

        .out-name { font-size: 100px; font-weight: 900; margin: 0; }
        .out-id { font-size: 50px; color: var(--text-sub); margin-bottom: 40px; }
        .out-bio { font-size: 40px; line-height: 1.5; white-space: pre-wrap; }

        .right {
            width: 700px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
        }

        .link-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .link-label { font-size: 30px; font-weight: bold; color: var(--text-sub); margin-bottom: 10px; }
        .link-url { font-size: 45px; font-weight: bold; color: #0984e3; word-break: break-all; }
    </style>
</head>
<body>

    <div class="editor">
        <input type="text" id="in-id" placeholder="Twitter ID (例: Gemini_AI)">
        <input type="text" id="in-name" placeholder="表示名" value="Your Name">
        <textarea id="in-bio" rows="3" placeholder="自己紹介文"></textarea>
        
        <div style="display:flex; gap:5px;">
            <input type="text" id="in-l1" placeholder="ラベル1 (例: GitHub)" style="width:40%;">
            <input type="text" id="in-u1" placeholder="URL 1" style="width:60%;">
        </div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="in-l2" placeholder="ラベル2 (例: Portfolio)" style="width:40%;">
            <input type="text" id="in-u2" placeholder="URL 2" style="width:60%;">
        </div>
        
        <button class="btn-save" onclick="saveImage()">画像を保存する</button>
    </div>

    <div id="preview-wrap">
        <div id="card">
            <div class="left">
                <img id="out-icon" src="https://unavatar.io/twitter/google">
                <p class="out-name" id="disp-name"></p>
                <p class="out-id" id="disp-id"></p>
                <div class="out-bio" id="disp-bio"></div>
            </div>
            <div class="right">
                <div class="link-box">
                    <div class="link-label" id="disp-l1"></div>
                    <div class="link-url" id="disp-u1"></div>
                </div>
                <div class="link-box">
                    <div class="link-label" id="disp-l2"></div>
                    <div class="link-url" id="disp-u2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['id', 'name', 'bio', 'l1', 'u1', 'l2', 'u2'];
        
        function update() {
            const id = document.getElementById('in-id').value;
            document.getElementById('disp-id').innerText = id ? '@' + id : '';
            document.getElementById('disp-name').innerText = document.getElementById('in-name').value;
            document.getElementById('disp-bio').innerText = document.getElementById('in-bio').value;
            document.getElementById('disp-l1').innerText = document.getElementById('in-l1').value;
            document.getElementById('disp-u1').innerText = document.getElementById('in-u1').value;
            document.getElementById('disp-l2').innerText = document.getElementById('in-l2').value;
            document.getElementById('disp-u2').innerText = document.getElementById('in-u2').value;
            
            if(id) {
                const img = document.getElementById('out-icon');
                img.crossOrigin = "anonymous";
                img.src = `https://unavatar.io/twitter/${id}`;
            }
        }

        inputs.forEach(k => document.getElementById('in-'+k).addEventListener('input', update));
        
        function setScale() {
            const wrap = document.getElementById('preview-wrap');
            const card = document.getElementById('card');
            const scale = wrap.offsetWidth / 1600;
            card.style.transform = `scale(${Math.min(scale, 1)})`;
            wrap.style.height = (900 * Math.min(scale, 1) + 40) + "px";
        }

        window.addEventListener('resize', setScale);
        window.addEventListener('load', () => { update(); setScale(); });

        function saveImage() {
            const card = document.getElementById('card');
            const currentTransform = card.style.transform;
            card.style.transform = "scale(1)";

            html2canvas(card, { useCORS: true, scale: 1 }).then(canvas => {
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = "my-profile-card.png";
                link.click();
                card.style.transform = currentTransform;
            });
        }
    </script>
</body>
</html>
